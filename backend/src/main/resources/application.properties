spring.application.name=feedback-backend
server.port=8080

# Fail on unknown JSON properties can be enabled later if strict DTO validation is needed.
spring.jackson.deserialization.fail-on-unknown-properties=false

# MySQL datasource (override via environment variables in production).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/feedback_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Saikumar@2007}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
